<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>

    <body>
        <div class="link">
            <a link href="index.html">Google </a>
        </div>
        <!--Container div with input feilds-->

        <!-- I have used line breaks afterevery input  field-->
        <div class="frm">
            <form action="https://www.google.com/advanced_search">
                <div class="container" class="adv">
                    <h3>Advanced Search</h3>

                    <label for="all">all these words:</label>
                    <input type="text" id="all"><br><br>

                    <label for="exact">this exact word or phrase:</label>
                    <input type="text" id="this"><br><br>


                    <label for="any">any of these words:</label>
                    <input type="text" id="any"><br><br>

                    <label for="numbers">numbers ranging from:</label>
                    <input type="text" id="numbers"><br><br> 
                     

                    <div class="nar">
                    <h4>Then narrow your results by</h4>

                    <lable for="lang">language:</lable>
                    <input type="text" id="lang" placeholder="any language"><br><br> 

                    <lable for="reg">region:</lable>
                    <input type="text" id="reg" placeholder="any region"><br><br> 

                    
                    <lable for="site">site or domain:</lable>
                    <input type="text" id="site"><br><br> 
                    

                    
                    <lable for="terms">terms appearing:</lable>
                    <input type="text" id="terms" placeholder="anywhere in the page"><br><br> 


                    <lable for="file">filetype:</lable>
                    <input type="text" id="file" placeholder="anyformat"><br><br> 

                  
                    <lable for="usaeg">usage rights:</lable>
                    <input type="text" id="use" placeholder="not filtered by licence"><br><br> 
                    </div>
                     
                    <button type="submit">Advanced Search</button>

                </form>
            </div>

<!--Style for the whole page-->
            <style>
                label {
                    display: inline-block;
                    width: 150px;
                    text-align: left;
                    padding-right: 10px;
                }

                input {
                    display: inline-block;
                    vertical-align: middle;
                }

                .container {
                    margin: 24px;


                }

                .link {
                    font-size: 20px;

                }

                .p {
                    font-weight: bold;
                    font-size: large;
                }
            </style>

        </body>

    </html>
